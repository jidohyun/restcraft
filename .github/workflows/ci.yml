# CI: runs on every push to main and on every pull request.
#
# Two independent jobs:
#   - lsp:  native LSP server crate (lsp/) — cargo test + clippy (deny warnings)
#   - wasm: root Zed extension crate — cargo check against wasm32-wasip2
#
# The two crates are intentionally separate cargo workspaces (lsp/Cargo.toml
# declares an empty [workspace]), so each job caches/builds its own root.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lsp:
    name: lsp (test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (stable)
        run: |
          rustup update stable
          rustup default stable
          rustup component add clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: lsp

      - name: cargo test
        working-directory: lsp
        run: cargo test

      - name: cargo clippy
        working-directory: lsp
        run: cargo clippy --all-targets -- -D warnings

  wasm:
    name: extension (wasm32-wasip2 check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust (stable + wasm32-wasip2)
        run: |
          rustup update stable
          rustup default stable
          rustup target add wasm32-wasip2

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo check (Zed extension, WASM)
        run: cargo check --target wasm32-wasip2

      # Host-target run of the extension crate's unit tests — these pin the
      # release-asset name contract shared with release.yml.
      - name: cargo test (host, asset contract)
        run: cargo test
